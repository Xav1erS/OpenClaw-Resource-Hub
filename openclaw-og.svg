<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">OpenClaw Resource Hub</title>
  <desc id="desc">OpenClaw Resource Hub social preview card.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#1f1022"/>
      <stop offset="48%" stop-color="#071225"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientTransform="translate(230 170) rotate(40) scale(380 300)">
      <stop offset="0%" stop-color="#fb7185" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#fb7185" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="0" cy="0" r="1" gradientTransform="translate(980 480) rotate(-30) scale(360 280)">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#94a3b8" stroke-opacity="0.12" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowLeft)"/>
  <rect width="1200" height="630" fill="url(#glowRight)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <g transform="translate(92 80)">
    <rect x="0" y="0" width="88" height="88" rx="28" fill="#3f0d18" stroke="#fb7185" stroke-opacity="0.4"/>
    <text x="44" y="56" text-anchor="middle" fill="#fff1f2" font-size="36" font-family="Segoe UI, Arial, sans-serif" font-weight="700" letter-spacing="5">OC</text>
    <text x="118" y="30" fill="#94a3b8" font-size="26" font-family="Segoe UI, Arial, sans-serif" letter-spacing="7">OPENCLAW</text>
    <text x="118" y="78" fill="#ffffff" font-size="56" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Resource Hub</text>
    <text x="0" y="230" fill="#fecdd3" font-size="24" font-family="Segoe UI, Arial, sans-serif" letter-spacing="8">STANDALONE PAGES</text>
    <text x="0" y="332" fill="#ffffff" font-size="108" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Launch Faster</text>
    <text x="0" y="404" fill="#cbd5e1" font-size="34" font-family="Segoe UI, Arial, sans-serif">Quick Start, Command Center, Task Library, Cost Calculator, Tutorials, Release Notes.</text>
  </g>
  <g transform="translate(835 185)">
    <rect width="250" height="280" rx="34" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/>
    <text x="28" y="52" fill="#94a3b8" font-size="24" font-family="Segoe UI, Arial, sans-serif">Goal</text>
    <text x="28" y="124" fill="#ffffff" font-size="54" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Ship</text>
    <text x="28" y="188" fill="#ffffff" font-size="54" font-family="Segoe UI, Arial, sans-serif" font-weight="700">usable</text>
    <text x="28" y="252" fill="#ffffff" font-size="54" font-family="Segoe UI, Arial, sans-serif" font-weight="700">pages</text>
  </g>
</svg>
